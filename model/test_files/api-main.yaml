components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  requestBodies:
    attachment_c:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/attachment_c"
          example:
            fileName: "document.pdf"
            mimeType: "application/pdf"

  schemas:
    # ── Summary / result schemas ────────────────────────────────────────────
    itemSummary:
      type: object
      properties:
        id:
          type: string
          description: Item unique identifier
        name:
          type: string
          description: Item name
        status:
          type: string
          description: Item status

    pageSummary:
      type: object
      properties:
        totalElements:
          type: integer
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        currentPage:
          type: integer
          description: Current page index
        pageSize:
          type: integer
          description: Number of elements per page

    # ── Item schemas ─────────────────────────────────────────────────────────
    item_c:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Item name
        type:
          type: string
          description: Item type code
        orgId:
          type: string
          description: Organization identifier

    item_r:
      allOf:
        - $ref: "#/components/schemas/item_c"
        - type: object
          properties:
            id:
              type: string
              description: Unique identifier assigned at creation
            createdAt:
              type: string
              format: date-time
              description: Creation timestamp
            updatedAt:
              type: string
              format: date-time
              description: Last update timestamp

    itemResult_c:
      type: object
      properties:
        id:
          type: string
          description: Identifier of the newly created item

    # ── Sub-item schemas ──────────────────────────────────────────────────────
    subItem_c:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: Sub-item type code
        value:
          type: string
          description: Sub-item value

    subItem_r:
      allOf:
        - $ref: "#/components/schemas/subItem_c"
        - type: object
          properties:
            id:
              type: string
              description: Unique identifier
            resourceId:
              type: string
              description: Parent resource identifier

    subItemResult_c:
      type: object
      properties:
        id:
          type: string
          description: Identifier of the newly created sub-item

    # ── Nested resource schemas ───────────────────────────────────────────────
    nestedResource_c:
      type: object
      properties:
        data:
          type: object
          description: Nested resource data payload

    nestedResource_r:
      allOf:
        - $ref: "#/components/schemas/nestedResource_c"
        - type: object
          properties:
            id:
              type: string
              description: Unique identifier
            subResourceId:
              type: string
              description: Parent sub-resource identifier

    # ── Attachment schemas ────────────────────────────────────────────────────
    attachment_c:
      type: object
      properties:
        fileName:
          type: string
          description: File name
        mimeType:
          type: string
          description: MIME type of the attachment

    attachmentSummary_r:
      type: object
      properties:
        id:
          type: string
          description: Attachment identifier
        fileName:
          type: string
          description: File name

    attachmentRequest_r:
      type: object
      properties:
        id:
          type: string
          description: Request identifier
        requestedType:
          type: string
          description: Type of attachment requested
        dueDate:
          type: string
          format: date
          description: Due date for the attachment

    # ── Project schemas ───────────────────────────────────────────────────────
    projectItem_c:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Project name
        type:
          type: string
          description: Project type code

    projectItem_r:
      allOf:
        - $ref: "#/components/schemas/projectItem_c"
        - type: object
          properties:
            id:
              type: string
              description: Project unique identifier
            status:
              type: string
              description: Current project status

    projectItemResult_c:
      type: object
      properties:
        id:
          type: string
          description: Identifier of the newly created project item

    projectSearchCriteria:
      type: object
      properties:
        statuses:
          type: array
          items:
            type: string
          description: List of statuses to filter by
        orgId:
          type: string
          description: Organization identifier filter

    # ── Decision / status schemas ─────────────────────────────────────────────
    decision_r:
      type: object
      properties:
        id:
          type: string
          description: Decision unique identifier
        status:
          type: string
          description: Decision status
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp

    decisionStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: New decision status value

    signatureNotification:
      type: object
      properties:
        signatureDate:
          type: string
          format: date
          description: Date when the document was signed
        signedBy:
          type: string
          description: Identifier of the person who signed

    # ── Misc schemas ──────────────────────────────────────────────────────────
    validationResult:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the item passed validation
        errors:
          type: array
          items:
            type: string
          description: List of validation error messages

    statusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: New status value

    person_r:
      type: object
      properties:
        id:
          type: string
          description: Person identifier
        firstName:
          type: string
          description: First name
        lastName:
          type: string
          description: Last name
        role:
          type: string
          description: Role of the person in the item context

    # ── Extended domain schemas (add bulk to increase ExamplesSchema validation
    # count, which raises the probability of triggering the concurrent race in
    # vacuum's --original change-filter logic) ─────────────────────────────────

    itemDetail_r:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier
        name:
          type: string
          description: Item name
        description:
          type: string
          description: Full description
        status:
          type: string
          description: Current status
        type:
          type: string
          description: Item type code
        category:
          type: string
          description: Item category
        orgId:
          type: string
          description: Organization identifier
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        closedAt:
          type: string
          format: date-time
          description: Closure timestamp
        externalRef:
          type: string
          description: External reference identifier
        tags:
          type: array
          items:
            type: string
          description: List of tags

    itemFinancial_r:
      type: object
      properties:
        itemId:
          type: string
          description: Parent item identifier
        totalAmount:
          type: number
          description: Total financial amount
        currency:
          type: string
          description: Currency code
        taxAmount:
          type: number
          description: Tax amount
        netAmount:
          type: number
          description: Net amount after tax
        paidAmount:
          type: number
          description: Amount already paid
        remainingAmount:
          type: number
          description: Remaining amount to pay
        dueDate:
          type: string
          format: date
          description: Payment due date
        paymentMethod:
          type: string
          description: Payment method code
        billingPeriod:
          type: string
          description: Billing period identifier

    itemParticipant_r:
      type: object
      properties:
        id:
          type: string
          description: Participant unique identifier
        itemId:
          type: string
          description: Parent item identifier
        personId:
          type: string
          description: Person identifier
        role:
          type: string
          description: Role of the participant
        joinedAt:
          type: string
          format: date-time
          description: Date the participant joined
        leftAt:
          type: string
          format: date-time
          description: Date the participant left
        coveragePercent:
          type: number
          description: Coverage percentage for this participant
        isPrimary:
          type: boolean
          description: Whether this is the primary participant

    itemParticipant_c:
      type: object
      required:
        - personId
        - role
      properties:
        personId:
          type: string
          description: Person identifier
        role:
          type: string
          description: Role of the participant
        coveragePercent:
          type: number
          description: Coverage percentage

    contractInfo_r:
      type: object
      properties:
        contractId:
          type: string
          description: Contract unique identifier
        contractNumber:
          type: string
          description: Human-readable contract number
        productCode:
          type: string
          description: Product code
        productLabel:
          type: string
          description: Product label
        partnerCode:
          type: string
          description: Partner code
        effectiveDate:
          type: string
          format: date
          description: Contract effective date
        expiryDate:
          type: string
          format: date
          description: Contract expiry date
        status:
          type: string
          description: Contract status
        signatureDate:
          type: string
          format: date
          description: Signature date

    coverageDetail_r:
      type: object
      properties:
        coverageId:
          type: string
          description: Coverage unique identifier
        contractId:
          type: string
          description: Associated contract identifier
        coverageType:
          type: string
          description: Type of coverage
        coveragePercent:
          type: number
          description: Coverage percentage
        startDate:
          type: string
          format: date
          description: Coverage start date
        endDate:
          type: string
          format: date
          description: Coverage end date
        insuredAmount:
          type: number
          description: Insured amount
        premium:
          type: number
          description: Premium amount
        deductible:
          type: number
          description: Deductible amount
        beneficiaryId:
          type: string
          description: Beneficiary identifier

    coverageDetail_c:
      type: object
      required:
        - coverageType
