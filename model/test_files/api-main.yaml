openapi: 3.0.0
info:
  title: "Items Management API"
  description: API for managing items, sub-items and their nested resources
  version: "1.0"
  contact:
    name: API Team
    email: api-team@example.com
security:
  - BearerAuth: []
tags:
  - name: Items
    description: Operations on items
  - name: SubItems
    description: Operations on sub-items belonging to items
  - name: NestedResources
    description: Operations on nested resources
  - name: Attachments
    description: Operations on attachments
  - name: Projects
    description: Operations on project items
paths:
  "/v1/items":
    get:
      tags:
        - Items
      summary: Search items
      description: Returns a paginated list of items matching the given filters
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/pageSize
        - $ref: api-common.yaml#/components/parameters/pageNumber
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/itemSummary"
                  page:
                    $ref: "#/components/schemas/pageSummary"
              example:
                content: []
                page:
                  totalElements: 0
                  totalPages: 0
                  currentPage: 0
                  pageSize: 20
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    post:
      tags:
        - Items
      summary: Create an item
      description: Creates a new item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/item_c"
            example:
              name: "New Item"
              type: "TYPE_A"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/itemResult_c"
              example:
                id: "ITEM-001"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}":
    get:
      tags:
        - Items
      summary: Get an item by id
      description: Returns a single item by its unique identifier
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/item_r"
              example:
                id: "ITEM-001"
                name: "Example Item"
                status: "ACTIVE"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    patch:
      tags:
        - Items
      summary: Update an item
      description: Partially updates an existing item using JSON Patch
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: api-common.yaml#/components/schemas/patchRequest
            example:
              - op: replace
                path: /status
                value: "INACTIVE"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/item_r"
              example:
                id: "ITEM-001"
                name: "Example Item"
                status: "INACTIVE"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    delete:
      tags:
        - Items
      summary: Delete an item
      description: Deletes an existing item by its identifier
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      responses:
        "204":
          description: No Content
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/validate":
    post:
      tags:
        - Items
      summary: Validate an item
      description: Triggers validation of the item and returns any validation errors
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validationResult"
              example:
                valid: true
                errors: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: api-common.yaml#/components/schemas/apiError
              example:
                code: "422"
                message: "Validation failed"
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems":
    get:
      tags:
        - SubItems
      summary: List sub-items of an item
      description: Returns sub-items associated with the specified item
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/pageSize
        - $ref: api-common.yaml#/components/parameters/pageNumber
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/subItem_r"
              example:
                content: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    post:
      tags:
        - SubItems
      summary: Create a sub-item
      description: Creates a new sub-item under the specified item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/subItem_c"
            example:
              type: "SUB_TYPE_A"
              value: "some value"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subItemResult_c"
              example:
                id: "SUB-001"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems/{subResourceId}":
    get:
      tags:
        - SubItems
      summary: Get a sub-item
      description: Returns a single sub-item by its identifier
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subItem_r"
              example:
                id: "SUB-001"
                resourceId: "ITEM-001"
                type: "SUB_TYPE_A"
                value: "some value"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    patch:
      tags:
        - SubItems
      summary: Update a sub-item
      description: Partially updates a sub-item using JSON Patch
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: api-common.yaml#/components/schemas/patchRequest
            example:
              - op: replace
                path: /value
                value: "updated value"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subItem_r"
              example:
                id: "SUB-001"
                resourceId: "ITEM-001"
                type: "SUB_TYPE_A"
                value: "updated value"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    delete:
      tags:
        - SubItems
      summary: Delete a sub-item
      description: Removes a sub-item from the parent item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      responses:
        "204":
          description: No Content
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems/{subResourceId}/nestedResources":
    get:
      tags:
        - NestedResources
      summary: List nested resources
      description: Returns nested resources under the specified sub-item
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
        - $ref: api-common.yaml#/components/parameters/pageSize
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/nestedResource_r"
              example: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    post:
      tags:
        - NestedResources
      summary: Create a nested resource
      description: Creates a new nested resource under the specified sub-item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/nestedResource_c"
            example:
              data:
                key: "value"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/nestedResource_r"
              example:
                id: "NEST-001"
                subResourceId: "SUB-001"
                data:
                  key: "value"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems/{subResourceId}/nestedResources/{nestedResourceId}":
    get:
      tags:
        - NestedResources
      summary: Get a nested resource
      description: Returns a nested resource by its identifier
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
        - $ref: api-common.yaml#/components/parameters/nestedResourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/nestedResource_r"
              example:
                id: "NEST-001"
                subResourceId: "SUB-001"
                data:
                  key: "value"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    delete:
      tags:
        - NestedResources
      summary: Delete a nested resource
      description: Removes a nested resource
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
        - $ref: api-common.yaml#/components/parameters/nestedResourceId
      responses:
        "204":
          description: No Content
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/attachments":
    get:
      tags:
        - Attachments
      summary: List attachments of an item
      description: Returns all attachments associated with an item
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attachmentSummary_r"
              example: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    post:
      tags:
        - Attachments
      summary: Upload an attachment
      description: Uploads a new attachment to an item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      requestBody:
        $ref: "#/components/requestBodies/attachment_c"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/attachmentSummary_r"
              example:
                id: "ATT-001"
                fileName: "document.pdf"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/attachmentRequests":
    get:
      tags:
        - Attachments
      summary: List attachment requests of an item
      description: Returns all pending attachment requests for an item
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attachmentRequest_r"
              example: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/attachmentRequests/{subResourceId}/reception":
    post:
      tags:
        - Attachments
      summary: Acknowledge attachment reception
      description: Marks the reception of a requested attachment
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/item_r"
              example:
                id: "ITEM-001"
                name: "Example Item"
                status: "ACTIVE"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/decisions":
    get:
      tags:
        - Items
      summary: Get decisions for an item
      description: Returns all decisions associated with the item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/decision_r"
              example: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems/{subResourceId}/decisions":
    get:
      tags:
        - SubItems
      summary: Get decisions for a sub-item
      description: Returns all decisions associated with the sub-item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/decision_r"
              example: []
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems/{subResourceId}/decisions/decisionStatus":
    patch:
      tags:
        - SubItems
      summary: Update a sub-item decision status
      description: Updates the decision status of a sub-item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/decisionStatusUpdate"
            example:
              status: "APPROVED"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/decision_r"
              example:
                id: "DEC-001"
                status: "APPROVED"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/subItems/{subResourceId}/decisions/signatureNotification":
    post:
      tags:
        - SubItems
      summary: Notify signature for a sub-item decision
      description: Sends a signature notification related to a sub-item decision
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
        - $ref: api-common.yaml#/components/parameters/subResourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/signatureNotification"
            example:
              signatureDate: "2024-01-15"
              signedBy: "USER-001"
      responses:
        "200":
          description: OK
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/items/{resourceId}/itemStatus":
    patch:
      tags:
        - Items
      summary: Update item status
      description: Updates the current status of an item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
        - $ref: api-common.yaml#/components/parameters/resourceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/statusUpdate"
            example:
              status: "CLOSED"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/item_r"
              example:
                id: "ITEM-001"
                name: "Example Item"
                status: "CLOSED"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "404":
          $ref: api-common.yaml#/components/responses/notFound
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError

  "/v1/projectItems":
    post:
      tags:
        - Projects
      summary: Create a project item
      description: Creates a new project item
      parameters:
        - $ref: api-common.yaml#/components/parameters/mandatoryOrgId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/projectItem_c"
            example:
              name: "New Project"
              type: "PROJECT_TYPE_A"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/projectItemResult_c"
              example:
                id: "PROJ-001"
        "400":
          $ref: api-common.yaml#/components/responses/badRequest
        "401":
          $ref: api-common.yaml#/components/responses/unauthorized
        "500":
          $ref: api-common.yaml#/components/responses/internalServerError
    get:
      tags:
        - Projects
      summary: Search project items
      description: Returns a paginated list of project items
      parameters:
        - $ref: api-common.yaml#/components/parameters/optionalOrgId
        - $ref: api-common.yaml#/components/parameters/pageSize
        - $ref: api-common.yaml#/components/parameters/pageNumber
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
