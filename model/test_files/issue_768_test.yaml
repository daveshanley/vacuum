        type: about:blank

  responses:
    badRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailV1'
          examples:
            invalidQuery:
              $ref: '#/components/examples/BadRequestInvalidQuery'
    notFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailV1'
          examples:
            applicationNotFound:
              $ref: '#/components/examples/NotFoundApplication'
    forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailV1'
          examples:
            insufficientPermissions:
              $ref: '#/components/examples/ForbiddenInsufficientPermissions'
    unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailV1'
          examples:
            missingToken:
              $ref: '#/components/examples/UnauthorizedMissingToken'
    conflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailV1'
          examples:
            operationInProgress:
              $ref: '#/components/examples/ConflictOperationInProgress'
    unprocessableEntity:
      description: Unprocessable Entity
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailV1'
          examples:
            invalidObjective:
              $ref: '#/components/examples/UnprocessableEntityInvalidObjective'
            invalidName:
              $ref: '#/components/examples/UnprocessableEntityInvalidName'
  schemas:
    EnvironmentClassV1:
      type: string
      enum: [GLOBAL]
      example: GLOBAL
    ResourceV1:
      type: object
      required: [spec]
      properties:
        id:
          type: string
          readOnly: true
          minLength: 1
          example: pricing-events
        applicationCode:
          type: string
          readOnly: true
          minLength: 1
          example: bookingtool
        revisionId:
          type: string
          minLength: 1
          example: afe8c43f-ed9f-4dce-8b0a-36b9176226cb
          format: uuid
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        createdDate:
          type: string
          readOnly: true
          format: date-time
          example: 2007-03-01T13:00:00Z
        lastModifiedDate:
          type: string
          readOnly: true
          format: date-time
          example: 2007-03-01T13:00:00Z
        labels:
          type: object
          additionalProperties:
            type: string
          example:
            costCenter: CC1234
            compliance: pci-dss
        spec:
          $ref: '#/components/schemas/ResourceSpecV1'
    ResourcePageV1:
      allOf:
        - $ref: '#/components/schemas/PageV1'
        - type: object
          required: [content]
          properties:
            content:
              type: array
              minItems: 0
              items:
                $ref: '#/components/schemas/ResourceV1'
    PipelinePageV1:
      allOf:
        - $ref: '#/components/schemas/PageV1'
        - type: object
          required: [content]
          properties:
            content:
              type: array
              minItems: 0
              items:
                $ref: '#/components/schemas/PipelineV1'
    ResourceTypeV1:
      type: string
      enum: [SERVICE_LEVEL_OBJECTIVE]
      example: SERVICE_LEVEL_OBJECTIVE
    ResourceSpecV1:
      type: object
      required: [environmentClass, resourceType]
      properties:
        environmentClass:
          $ref: '#/components/schemas/EnvironmentClassV1'
        resourceType:
          $ref: '#/components/schemas/ResourceTypeV1'
      oneOf:
        - $ref: '#/components/schemas/ServiceLevelObjectiveV1'
      discriminator:
        propertyName: resourceType
        mapping:
          SERVICE_LEVEL_OBJECTIVE: '#/components/schemas/ServiceLevelObjectiveV1'
    ServiceLevelObjectiveV1:
      type: object
      required: [objective, name, sli]
      properties:
        objective:
          type: number
          format: float
          example: 99.5
          maximum: 100
          minimum: 0.1
        name:
          type: string
          example: container-booking-availability
          minLength: 3
          pattern: ^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$
        sli:
          $ref: '#/components/schemas/ServiceLevelIndicatorV1'
        alert:
          $ref: '#/components/schemas/ServiceLevelObjectiveAlertV1'
    ServiceLevelIndicatorV1:
      type: object
      required: [errorQuery, totalQuery]
      properties:
        errorQuery:
          type: string
          example: sum(rate(http_request_duration_seconds_count{job="container-booking",code=~"(5..|429)"}[{{.window}}]))
          minLength: 20
          pattern: \{\{\.window\}\}
        totalQuery:
          type: string
          example: sum(rate(http_request_duration_seconds_count{job="container-booking"}[{{.window}}]))
          minLength: 20
          pattern: \{\{\.window\}\}
    ServiceLevelObjectiveAlertV1:
      type: object
      minProperties: 2
      required: [name]
      properties:
        name:
          type: string
          example: BookingsFailing
          minLength: 3
        ticket:
          # https://github.com/OAI/OpenAPI-Specification/issues/1514#issuecomment-1386613645.
          allOf:
            - $ref: '#/components/schemas/ServiceLevelObjectiveAlertSeverityV1'
        page:
          allOf:
            - $ref: '#/components/schemas/ServiceLevelObjectiveAlertSeverityV1'
    ServiceLevelObjectiveAlertSeverityV1:
      type: object
      required: [labels]
      properties:
        labels:
          example:
            hedwig_scope: booking-team
            severity: warning
          type: object
          required: [hedwig_scope]
          properties:
            hedwig_scope:
              type: string
              minLength: 1
          additionalProperties:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string
          example:
            runbook: https://runbooks.example.com/bookings-failing
    PipelineV1:
      type: object
      required:
        - id
        - applicationCode
        - resourceId
        - revisionId
        - operation
        - statusCode
        - createdDate
      readOnly: true
      properties:
        id:
          type: string
          minLength: 1
          example: afe8c43f-ed9f-4dce-8b0a-36b9176226cb
        applicationCode:
          type: string
          minLength: 1
          example: bookingtool
        resourceId:
          type: string
          minLength: 1
          example: api-availability
        revisionId:
          type: string
          minLength: 1
          example: afe8c43f-ed9f-4dce-8b0a-36b9176226cb
        operation:
          $ref: '#/components/schemas/PipelineOperationV1'
        statusCode:
          $ref: '#/components/schemas/PipelineStatusCodeV1'
        detail:
          $ref: '#/components/schemas/ProviderLogRecordV1'
        createdDate:
          type: string
          format: date-time
        completedDate:
          type: string
          format: date-time
    ProblemDetailV1:
      type: object
      required: [title, status, detail, instance, type, traceId]
      properties:
        title:
          type: string
          minLength: 1
          example: Bad Request
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          $ref: '#/components/schemas/ProviderLogRecordV1'
        instance:
          type: string
          minLength: 1
          example: /applications/v1/bookingtool
        traceId:
          type: string
          minLength: 1
          example: b0e7d7054ce9c38330b276114ccec036
        type:
          type: string
          minLength: 1
          example: https://example.com/docs/validation-error
    PipelineStatusCodeV1:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED]
    PipelineOperationV1:
      type: string
      enum: [CREATE, UPDATE, DELETE]
    ProviderLogRecordV1:
      type: object
      required: [code, severity, message]
      properties:
        code:
          $ref: '#/components/schemas/ProviderLogRecordCodeV1'
        severity:
          $ref: '#/components/schemas/ProviderLogRecordSeverityV1'
        message:
          type: string
          minLength: 1
    ProviderLogRecordSeverityV1:
      type: string
      enum: [INFO, WARNING, ERROR]
    ProviderLogRecordCodeV1:
      type: string
      enum:
        - AUTHENTICATION_FAILED
        - AUTHORIZATION_FAILED
        - REQUEST_TO_EXTERNAL_API_FAILED
        - UNEXPECTED_ERROR
        - OPERATION_NOT_FOUND
        - INVALID_REQUEST
        - WORKFLOW_EXECUTION_RUNNING
        - RESOURCE_NOT_FOUND
        - CREATED_SERVICE_LEVEL_OBJECTIVE
        - CREATE_SERVICE_LEVEL_OBJECTIVE_FAILED
        - DATABASE_INSERT_SERVICE_LEVEL_OBJECTIVE
        - POST_SERVICE_LEVEL_OBJECTIVE_RULES
        - UPDATED_SERVICE_LEVEL_OBJECTIVE
        - UPDATE_SERVICE_LEVEL_OBJECTIVE_FAILED
        - DELETE_SERVICE_LEVEL_OBJECTIVE_ALERT_RULES
        - DELETED_SERVICE_LEVEL_OBJECTIVE
        - DELETE_SERVICE_LEVEL_OBJECTIVE_FAILED
        - DELETE_SERVICE_LEVEL_OBJECTIVE_RULES
        - DATABASE_DELETE_SERVICE_LEVEL_OBJECTIVE
    PageV1:
      required: [number, size, totalPages, totalElements, first, last]
      type: object
      properties:
        number:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        totalElements:
          type: integer
          minimum: 0
        first:
          type: boolean
        last:
          type: boolean
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    applicationCode:
      name: applicationCode
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Application code to use for this request.
      example: bookingtool
    resourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Resource ID to use for this request.
      example: pricing-events
    pipelineId:
      name: pipelineId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Pipeline ID to use for this request.
      example: afe8c43f-ed9f-4dce-8b0a-36b9176226cb
    resourceType:
      name: resourceType
      in: query
      required: false
      description: Resource type to filter by.
      example: SERVICE_LEVEL_OBJECTIVE
      schema:
        $ref: '#/components/schemas/ResourceTypeV1'
    environmentClass:
      name: environmentClass
      in: query
      required: false
      description: Environment class to filter by.
      example: GLOBAL
      schema:
        $ref: '#/components/schemas/EnvironmentClassV1'
    pipelineStatusCode:
      name: statusCode
      in: query
      required: false
      description: Pipeline status code to filter by.
      example: PENDING
