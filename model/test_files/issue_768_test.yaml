        $ref: '#/components/schemas/PipelineStatusCodeV1'
    pipelineOperation:
      name: operation
      in: query
      required: false
      description: Pipeline operation to filter by.
      example: CREATE
      schema:
        $ref: '#/components/schemas/PipelineOperationV1'
    page:
      name: page
      description: Desired page number (zero-indexed).
      example: 0
      in: query
      required: false
      schema:
        default: 0
        minimum: 0
        type: integer
    size:
      name: size
      description: Page size.
      example: 10
      in: query
      required: false
      schema:
        default: 10
        minimum: 1
        maximum: 100
        type: integer
