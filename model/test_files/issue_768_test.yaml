                severity: critical

    PipelineCreateAccepted:
      summary: Pipeline created for resource creation
      value:
        id: a5b024f7-4ee0-4e18-8a06-571a710d6150
        applicationCode: bookingtool
        resourceId: container-booking-availability
        revisionId: 85b9563e-3893-497c-a4bf-d06e69619e09
        operation: CREATE
        statusCode: PENDING
        createdDate: '2024-03-15T10:30:00Z'

