---
openapi: 3.0.3
info:
  title: Provisioning API
  version: 3.3.0
  description: Manage resources in the Provisioning API.
servers:
  - url: https://api.example.com/provisioningapi/controlplane
  - url: https://api-staging.example.com/provisioningapi/controlplane

security:
  - jwt: []
tags:
  - name: Miscellaneous
  - name: Resources
paths:
  /health/v1:
    get:
      tags: [Miscellaneous]
      summary: Check Health
      operationId: getHealthV1
      responses:
        '200':
          description: The platform provisioning API is healthy
          content:
            application/json:
              schema:
                type: object
              examples:
                success:
                  $ref: '#/components/examples/HealthSuccessResponse'
        '503':
          description: The platform provisioning API is unavailable
          content:
            application/json:
              schema:
                type: object
              examples:
                unavailable:
                  $ref: '#/components/examples/HealthUnavailableResponse'
  /applications/{applicationCode}/resources/v1:
    parameters:
      - $ref: '#/components/parameters/applicationCode'
    get:
      tags: [Resources]
      summary: Get Resources
      operationId: getResourcesV1
      parameters:
        - $ref: '#/components/parameters/resourceType'
        - $ref: '#/components/parameters/environmentClass'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: List of resources owned by the application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePageV1'
              examples:
                multipleResources:
                  $ref: '#/components/examples/ResourcePageMultipleItems'
                singleResource:
                  $ref: '#/components/examples/ResourcePageSingleItem'
                emptyPage:
                  $ref: '#/components/examples/ResourcePageEmpty'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/notFound'
    post:
      tags: [Resources]
      summary: Create Resource
      operationId: createResourceV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceV1'
            examples:
              fullConfiguration:
                $ref: '#/components/examples/SLOCreateRequest'
              minimalConfiguration:
                $ref: '#/components/examples/SLOCreateRequestMinimal'
      responses:
        '202':
          description: Resource create request is accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineV1'
              examples:
                accepted:
                  $ref: '#/components/examples/PipelineCreateAccepted'
        '400':
          $ref: '#/components/responses/badRequest'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/notFound'
        '409':
          $ref: '#/components/responses/conflict'
        '422':
          $ref: '#/components/responses/unprocessableEntity'
  /applications/{applicationCode}/resources/v1/{resourceId}:
    parameters:
      - $ref: '#/components/parameters/applicationCode'
      - $ref: '#/components/parameters/resourceId'
    get:
      tags: [Resources]
      summary: Get Resource
      operationId: getResourceV1
      responses:
        '200':
          description: The resource owned by the application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceV1'
              examples:
                sloResource:
                  $ref: '#/components/examples/SLOResource'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/notFound'
    put:
      tags: [Resources]
      summary: Update Resource
      operationId: updateResourceV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceV1'
            examples:
              updateObjective:
                $ref: '#/components/examples/SLOUpdateRequest'
      responses:
        '202':
          description: Resource update request is accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineV1'
              examples:
                accepted:
                  $ref: '#/components/examples/PipelineUpdateAccepted'
        '400':
          $ref: '#/components/responses/badRequest'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/notFound'
        '409':
          $ref: '#/components/responses/conflict'
        '422':
          $ref: '#/components/responses/unprocessableEntity'
    delete:
      tags: [Resources]
      summary: Delete Resource
      operationId: deleteResourceV1
      responses:
        '202':
          description: Resource delete request is accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineV1'
              examples:
                accepted:
                  $ref: '#/components/examples/PipelineDeleteAccepted'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/notFound'
        '409':
          $ref: '#/components/responses/conflict'
  /applications/{applicationCode}/resources/{resourceId}/pipelines/v1:
    parameters:
      - $ref: '#/components/parameters/applicationCode'
      - $ref: '#/components/parameters/resourceId'
      - $ref: '#/components/parameters/pipelineStatusCode'
      - $ref: '#/components/parameters/pipelineOperation'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
    get:
      tags: [Resources]
      summary: Get Pipelines
      operationId: getPipelinesV1
      responses:
        '200':
          description: The pipelines for the resource owned by the application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelinePageV1'
              examples:
                multiplePipelines:
                  $ref: '#/components/examples/PipelinePageMultipleItems'
        '400':
          $ref: '#/components/responses/badRequest'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/notFound'
  /applications/{applicationCode}/resources/{resourceId}/pipelines/v1/{pipelineId}:
    parameters:
      - $ref: '#/components/parameters/applicationCode'
      - $ref: '#/components/parameters/resourceId'
      - $ref: '#/components/parameters/pipelineId'
    get:
      tags: [Resources]
      summary: Get Pipeline
      operationId: getPipelineV1
      responses:
        '200':
          description: The pipeline for the resource owned by the application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineV1'
              examples:
                pending:
                  $ref: '#/components/examples/PipelineCreateAccepted'
                running:
                  $ref: '#/components/examples/PipelineRunning'
                completed:
                  $ref: '#/components/examples/PipelineCompleted'
                failed:
                  $ref: '#/components/examples/PipelineFailed'
        '401':
          $ref: '#/components/responses/unauthorized'
        '400':
          $ref: '#/components/responses/badRequest'
        '404':
          $ref: '#/components/responses/notFound'
components:
  examples:
    HealthSuccessResponse:
      value: {}

    HealthUnavailableResponse:
      value: {}

    SLOCreateRequest:
      summary: Create SLO with ticket and page alerts
      value:
        spec:
          environmentClass: GLOBAL
          resourceType: SERVICE_LEVEL_OBJECTIVE
          objective: 99.5
          name: container-booking-availability
          sli:
            errorQuery: sum(rate(http_request_duration_seconds_count{job="container-booking",code=~"(5..|429)"}[{{.window}}]))
            totalQuery: sum(rate(http_request_duration_seconds_count{job="container-booking"}[{{.window}}]))
          alert:
            name: BookingAvailabilityLow
            ticket:
              labels:
                hedwig_scope: booking-team
                severity: warning
              annotations:
                runbook: https://runbooks.example.com/booking-availability
            page:
              labels:
                hedwig_scope: booking-team
                severity: critical
              annotations:
                runbook: https://runbooks.example.com/booking-availability
                summary: Booking service availability is critically low

    SLOCreateRequestMinimal:
      summary: Create SLO with minimal configuration
      value:
        spec:
          environmentClass: GLOBAL
          resourceType: SERVICE_LEVEL_OBJECTIVE
          objective: 99.9
          name: api-latency
          sli:
            errorQuery: sum(rate(http_request_duration_seconds_count{job="api",le="0.5"}[{{.window}}]))
            totalQuery: sum(rate(http_request_duration_seconds_count{job="api"}[{{.window}}]))

    SLOUpdateRequest:
      summary: Update SLO objective
      value:
        id: container-booking-availability
        applicationCode: bookingtool
