            lastModifiedDate: '2024-01-10T08:00:00Z'
            spec:
              environmentClass: GLOBAL
              resourceType: SERVICE_LEVEL_OBJECTIVE
              objective: 99.9
              name: api-availability
              sli:
                errorQuery: sum(rate(http_request_duration_seconds_count{job="api",code=~"5.."}[{{.window}}]))
                totalQuery: sum(rate(http_request_duration_seconds_count{job="api"}[{{.window}}]))
              alert:
                name: APIAvailabilityLow
                page:
                  labels:
                    hedwig_scope: platform-team
                    severity: critical
          - id: database-latency
            applicationCode: bookingtool
            revisionId: 3121690f-c001-465c-8e30-b5608cc39f8a
            createdDate: '2024-02-01T10:15:00Z'
            lastModifiedDate: '2024-02-01T10:15:00Z'
            spec:
              environmentClass: GLOBAL
              resourceType: SERVICE_LEVEL_OBJECTIVE
              objective: 99.5
              name: database-latency
              sli:
                errorQuery: sum(rate(database_query_duration_seconds_count{job="postgres",le="0.1"}[{{.window}}]))
                totalQuery: sum(rate(database_query_duration_seconds_count{job="postgres"}[{{.window}}]))
              alert:
                name: DatabaseLatencyHigh
                ticket:
                  labels:
                    hedwig_scope: database-team
          - id: message-processing
            applicationCode: bookingtool
            revisionId: 46c53794-7c65-42f1-be54-598807ba2c06
            createdDate: '2024-02-15T14:30:00Z'
            lastModifiedDate: '2024-03-01T09:20:00Z'
            spec:
              environmentClass: GLOBAL
              resourceType: SERVICE_LEVEL_OBJECTIVE
              objective: 99.0
              name: message-processing
              sli:
                errorQuery: sum(rate(kafka_message_errors_total{topic="bookings"}[{{.window}}]))
                totalQuery: sum(rate(kafka_messages_total{topic="bookings"}[{{.window}}]))
              alert:
                name: MessageProcessingFailing
                ticket:
                  labels:
                    hedwig_scope: integration-team

    ResourcePageEmpty:
      summary: Empty page
      value:
        number: 0
        size: 10
        totalPages: 0
        totalElements: 0
        first: true
        last: true
        content: []

    PipelinePageMultipleItems:
      summary: Page with multiple pipelines
      value:
        number: 0
        size: 10
        totalPages: 1
        totalElements: 3
        first: true
        last: true
        content:
          - id: 9d8903af-3b47-4b88-aad1-289466e8a061
            applicationCode: bookingtool
            resourceId: container-booking-availability
            revisionId: d0cf0e99-00ec-4d2e-ad0d-daad167d0f02
