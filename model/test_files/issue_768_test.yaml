    BadRequestInvalidQuery:
      summary: Invalid PromQL query
      value:
        title: Bad Request
        status: 400
        detail:
          code: INVALID_REQUEST
          severity: ERROR
          message: 'The totalQuery field contains invalid PromQL syntax: unexpected
            character in vector selector'
        instance: /controlplane/applications/bookingtool/resources/v1
        traceId: b0e7d7054ce9c38330b276114ccec036
        type: about:blank

    UnauthorizedMissingToken:
      summary: Missing authentication token
      value:
