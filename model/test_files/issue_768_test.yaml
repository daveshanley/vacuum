        completedDate: '2024-03-15T10:31:45Z'
        detail:
          code: CREATE_SERVICE_LEVEL_OBJECTIVE_FAILED
          severity: ERROR
          message: Failed to create service level objective due to invalid query syntax

    ResourcePageSingleItem:
      summary: Page with one resource
      value:
        number: 0
        size: 10
        totalPages: 1
        totalElements: 1
        first: true
        last: true
        content:
          - id: container-booking-availability
            applicationCode: bookingtool
            revisionId: a282c99f-8340-4900-a239-472644c7c439
            createdDate: '2024-01-15T09:30:00Z'
            lastModifiedDate: '2024-03-10T14:20:00Z'
            spec:
              environmentClass: GLOBAL
              resourceType: SERVICE_LEVEL_OBJECTIVE
              objective: 99.5
              name: container-booking-availability
              sli:
                errorQuery: sum(rate(http_request_duration_seconds_count{job="container-booking",code=~"(5..|429)"}[{{.window}}]))
                totalQuery: sum(rate(http_request_duration_seconds_count{job="container-booking"}[{{.window}}]))
              alert:
                name: BookingAvailabilityLow
                ticket:
                  labels:
                    hedwig_scope: booking-team

    ResourcePageMultipleItems:
      summary: Page with multiple resources
      value:
        number: 0
        size: 10
        totalPages: 1
        totalElements: 3
        first: true
        last: true
        content:
          - id: api-availability
            applicationCode: bookingtool
            revisionId: 810a6651-4931-4b74-9692-5b9b875fa2c1
