        traceId: f5a2c7b4863d9f1e2c3d6b8a0f2e5b7e
        type: about:blank

    ConflictOperationInProgress:
      summary: Operation already in progress
      value:
        title: Conflict
        status: 409
        detail:
          code: WORKFLOW_EXECUTION_RUNNING
          severity: ERROR
          message: An operation is already in progress for resource 'container-booking-availability'.
