name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Set up Go 1.x
        uses: actions/setup-go@v3
        with:
          go-version: 1.25
        id: go

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          fetch-tags: true
          show-progress: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: html-report/ui/yarn.lock

      - name: Check go mod tidy is up to date
        run: go mod tidy && git diff --exit-code

      - name: Get dependencies
        run: |
          go get -v -t -d ./...
          if [ -f Gopkg.toml ]; then
              curl https://raw.githubusercontent.com/golang/dep/master/install.sh | sh
              dep ensure
          fi

      - name: Test default source build
        run: go test ./...

      - name: Build HTML report UI assets
        run: ./scripts/build-ui-assets.sh

      - name: Test official build with HTML report UI
        run: go test -tags html_report_ui ./...

      - name: Build
        run: make build

  build-report-ui:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 20.x ]
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4
        name: Checkout repository

      - name: setup node ${{matrix.node-version}}
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
          cache: yarn
          cache-dependency-path: html-report/ui/yarn.lock

      - name: Build HTML report UI assets
        run: ./scripts/build-ui-assets.sh
        env:
          KEEP_NODE_MODULES: "1"

      - name: Test
        run: corepack yarn test
        working-directory: html-report/ui

      - name: Lint
        run: corepack yarn lint
        working-directory: html-report/ui
