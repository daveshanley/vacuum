name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          set -euo pipefail

          target_free_gb=95
          target_free_kb=$((target_free_gb * 1024 * 1024))

          available_kb() {
            df --output=avail / | tail -n 1
          }

          cleanup_path() {
            local path="$1"
            local label="$2"

            if [ "$(available_kb)" -ge "${target_free_kb}" ]; then
              return
            fi
            if [ ! -e "${path}" ]; then
              return
            fi

            echo "Removing ${label}: ${path}"
            sudo rm -rf "${path}"
            df -h /
          }

          df -h /
          cleanup_path /opt/ghc "Haskell runtime"
          cleanup_path /usr/share/dotnet ".NET runtime"
          df -h /

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          fetch-tags: true
          show-progress: true

      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
          cache: true
          cache-dependency-path: go.sum
        id: go

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: html-report/ui/package-lock.json

      - name: Check go mod tidy is up to date
        run: go mod tidy && git diff --exit-code

      - name: Build HTML report UI assets
        run: ./scripts/build-ui-assets.sh
        env:
          KEEP_NODE_MODULES: "1"

      - name: Test HTML report UI
        run: npm test
        working-directory: html-report/ui

      - name: Lint HTML report UI
        run: npm run lint
        working-directory: html-report/ui

      - name: Remove HTML report UI dependencies before Go checks
        run: rm -rf html-report/ui/node_modules

      - name: Test official build with coverage
        run: go test -tags html_report_ui -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Check default source build
        run: go build ./...

      - name: Build
        run: go build -tags html_report_ui -o bin/vacuum
